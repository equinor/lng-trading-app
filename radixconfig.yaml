apiVersion: radix.equinor.com/v1
kind: RadixApplication
metadata:
  name: lng-trading-app
spec:
  build:
    useBuildKit: true
  environments:
    - name: dev
      build:
        from: main
    - name: prod
      build:
        from: release
  components:
    - name: backend
      src: "."
      dockerfileName: backend/Dockerfile
      ports:
        - name: http
          port: 8000
      secrets:
        - SECRET_KEY
        - DATABRICKS_SERVER_HOSTNAME
        - DATABRICKS_HTTP_PATH
        - DATABRICKS_TENANT_ID
        - DATABRICKS_CLIENT_ID
        - DATABRICKS_CLIENT_SECRET
        - DATABRICKS_WORKSPACE_RESOURCE_ID
        - DATABRICKS_TOKEN
        - ATLAS_CLIENT_ID
        - ATLAS_CLIENT_SECRET
      variables:
        NEWS_BACKEND: databricks
        NEWS_TABLE: ms_vulcan_gplng_plab.lng_apac.platts_lng_top_news
        DATABRICKS_USE_SERVICE_PRINCIPAL: "true"
        DATABRICKS_WORKSPACE_URL: adb-1023210238843247.7.azuredatabricks.net
        DATABRICKS_JOB_ID: "93951735174333"
        FIRST_SUPERUSER: csee@equinor.com
      healthChecks:
        livenessProbe:
          httpGet:
            port: 8000
            path: /api/v1/utils/health-check
          initialDelaySeconds: 20
          periodSeconds: 20
        readinessProbe:
          httpGet:
            port: 8000
            path: /api/v1/utils/health-check
          initialDelaySeconds: 10
          periodSeconds: 10

    - name: frontend
      src: "."
      dockerfileName: frontend/Dockerfile
      ports:
        - name: http
          port: 8080
      publicPort: http
      environmentConfig:
        - environment: dev
          variables:
            VITE_BYPASS_AUTH: "false"
          authentication:
            oauth2:
              # Azure AD App Registration (client) ID that fronts the app.
              clientId: 60283d4b-f774-407b-983b-a22dcfeb6d03
              scope: "openid profile email"
              setXAuthRequestHeaders: true
              setAuthorizationHeader: false
              sessionStoreType: systemManaged
        - environment: prod
          variables:
            VITE_BYPASS_AUTH: "false"
          authentication:
            oauth2:
              # Azure AD App Registration (client) ID that fronts the app.
              clientId: 60283d4b-f774-407b-983b-a22dcfeb6d03
              scope: "openid profile email"
              # Forward the authenticated identity to the app as
              # X-Auth-Request-Email / X-Auth-Request-User headers.
              setXAuthRequestHeaders: true
              setAuthorizationHeader: false
              sessionStoreType: systemManaged
